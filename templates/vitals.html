{% extends "base.html" %}

{% block content %}

<div class="card">

    <h2>🩺 Vitals Prediction</h2>

    <form action="/predict_vitals" method="post" style="display: flex; flex-direction: column; gap: 10px; max-width: 300px; margin: 0 auto;">

        <input name="Age" type="number" placeholder="Age" required>

        <select name="Sex">
            <option value="0">Female</option>
            <option value="1">Male</option>
        </select>
        
        <select name="ChestPainType">
            <option value="0">Chest Pain: ATA (0)</option>
            <option value="1">Chest Pain: NAP (1)</option>
            <option value="2">Chest Pain: ASY (2)</option>
            <option value="3">Chest Pain: TA (3)</option>
        </select>

        <input name="RestingBP" type="number" placeholder="Resting Blood Pressure">
        <input name="Cholesterol" type="number" placeholder="Cholesterol">
        
        <select name="FastingBS">
            <option value="0">Fasting Blood Sugar < 120 mg/dl (0)</option>
            <option value="1">Fasting Blood Sugar > 120 mg/dl (1)</option>
        </select>
        
        <select name="RestingECG">
            <option value="0">Resting ECG: Normal (0)</option>
            <option value="1">Resting ECG: ST (1)</option>
            <option value="2">Resting ECG: LVH (2)</option>
        </select>

        <input name="MaxHR" type="number" placeholder="Max Heart Rate">
        
        <select name="ExerciseAngina">
            <option value="0">Exercise Angina: No (0)</option>
            <option value="1">Exercise Angina: Yes (1)</option>
        </select>
        
        <input name="Oldpeak" type="number" step="0.1" placeholder="Oldpeak (ST depression)">

        <button type="submit" style="margin-top: 10px;">Predict</button>

    </form>

    <br>
    <a href="/"><button>⬅ Back</button></a>

</div>

{% endblock %}
