{% extends "base.html" %}

{% block content %}

<div class="card" style="max-width: 400px;">
    <h2>Sign Up</h2>
    <p style="color: #666; margin-bottom: 20px;">Create your AI Healthcare account</p>

    <form method="POST" action="/register">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="password" name="password" placeholder="Password" required minlength="6">
        
        <button type="submit" style="margin-top: 15px;">Register</button>
    </form>

    <p style="margin-top: 20px; font-size: 0.9em; color: #555;">
        Already have an account? <a href="/login" style="color: #007BFF; text-decoration: none; font-weight: bold;">Login here</a>
    </p>
</div>

{% endblock %}
