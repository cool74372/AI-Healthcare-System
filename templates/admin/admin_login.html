<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login – AI Healthcare</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-wrap{width:100%;max-width:440px;padding:20px}
.login-card{background:#fff;border-radius:24px;padding:48px 44px;box-shadow:0 24px 64px rgba(0,0,0,.25)}
.login-logo{text-align:center;margin-bottom:36px}
.login-logo .icon{font-size:3rem;display:block;margin-bottom:12px}
.login-logo h1{font-size:1.6rem;font-weight:800;color:#0f172a}
.login-logo p{color:#64748b;font-size:.9rem;margin-top:6px}
.alert{padding:12px 16px;border-radius:10px;font-size:.85rem;font-weight:600;margin-bottom:20px;background:#fee2e2;color:#991b1b}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:.85rem;font-weight:600;color:#374151;margin-bottom:8px}
.form-group input{width:100%;padding:13px 16px;border-radius:10px;border:1.5px solid #e2e8f0;font-size:.95rem;font-family:'Inter',sans-serif;outline:none;transition:.2s;color:#1e293b}
.form-group input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.login-btn{width:100%;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;font-size:1rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:.2s;margin-top:4px}
.login-btn:hover{background:linear-gradient(135deg,#4f46e5,#3730a3);box-shadow:0 8px 20px rgba(99,102,241,.3)}
.back-link{text-align:center;margin-top:22px;font-size:.85rem;color:#64748b}
.back-link a{color:#6366f1;text-decoration:none;font-weight:600}
.divider{display:flex;align-items:center;gap:12px;margin:24px 0;color:#94a3b8;font-size:.8rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e2e8f0}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <span class="icon">🏥</span>
      <h1>Admin Portal</h1>
      <p>AI Healthcare System — Secure Access</p>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}{% for cat, msg in messages %}
        <div class="alert">{{ msg }}</div>
      {% endfor %}{% endif %}
    {% endwith %}
    <form method="POST" action="{{ url_for('admin.admin_login') }}">
      <div class="form-group">
        <label>Admin Email</label>
        <input type="email" name="email" placeholder="admin@healthcare.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button class="login-btn" type="submit">🔐 Sign In to Admin Panel</button>
    </form>
    <div class="back-link">
      <a href="/">← Back to main site</a>
    </div>
  </div>
</div>
</body>
</html>
