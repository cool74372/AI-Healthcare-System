{% extends "base.html" %}

{% block content %}

<div class="card" style="max-width: 400px;">
    <h2>Sign In</h2>
    <p style="color: #666; margin-bottom: 20px;">Welcome back to AI Healthcare</p>

    <form method="POST" action="/login">
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="password" name="password" placeholder="Password" required>
        
        <button type="submit" style="margin-top: 15px;">Login</button>
    </form>

    <p style="margin-top: 20px; font-size: 0.9em; color: #555;">
        Don't have an account? <a href="/register" style="color: #007BFF; text-decoration: none; font-weight: bold;">Sign up here</a>
    </p>
</div>

{% endblock %}
